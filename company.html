<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company · Tech Tape</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#EFF1ED;--panel:#F7F8F5;--ink:#14212B;--ink-soft:#4A5A66;--rule:#C9CEC6;--semi:#8C2F39;
--serif:'Libre Caslon Text',Georgia,serif;--mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'Inter',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
.wrap{max-width:860px;margin:0 auto;padding:28px 20px 60px}
.masthead{border-top:3px double var(--ink);border-bottom:1px solid var(--ink);padding:18px 0 14px;margin-bottom:20px}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
.kicker a{color:inherit;text-decoration:none;border-bottom:1px solid var(--ink-soft);margin-left:12px}
h1{font-family:var(--serif);font-size:clamp(26px,4.5vw,40px);font-weight:700;margin:4px 0 2px}
.ticker{font-family:var(--mono);font-size:14px;color:var(--ink-soft)}
.pick{margin-bottom:16px}
select{font-size:13px;padding:7px 10px;border:1px solid var(--rule);background:#fff;border-radius:0}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);margin-bottom:22px}
.cell{background:var(--panel);padding:12px 14px}
.cell .n{font-family:var(--mono);font-size:22px;font-weight:600}
.cell .l{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
.spark{display:flex;align-items:flex-end;gap:2px;height:26px;margin-top:4px}
.spark i{width:8px;background:var(--ink-soft);display:block;min-height:2px}
h2{font-family:var(--serif);font-size:18px;border-bottom:2px solid var(--ink);padding-bottom:4px;margin:22px 0 8px}
.deal,.story{border-bottom:1px solid var(--rule);padding:10px 2px}
.dname{font-family:var(--serif);font-weight:700}
.meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.note{font-size:13px;color:var(--ink-soft);margin-top:3px}
.s-title{font-family:var(--serif);font-weight:700;font-size:15px}
.s-title a{color:inherit;text-decoration:none;border-bottom:1px solid transparent}
.s-title a:hover{border-bottom-color:var(--ink)}
.imp{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.i3{background:#8C2F39}.i2{background:#B07C24}.i1{background:#C9CEC6}
.empty{padding:18px;font-style:italic;font-family:var(--serif);color:var(--ink-soft)}
.foot{margin-top:24px;padding-top:14px;border-top:1px solid var(--rule);font-size:11.5px;color:var(--ink-soft)}
@media(max-width:640px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body><div class="wrap">
<header class="masthead">
  <div class="kicker"><span>Company Dossier</span>
    <span><a href="index.html">Deals</a><a href="news.html">News</a><a href="league.html">League</a><a href="digest.html">Digest</a><a href="memo.html">Memo</a><a href="ask.html">Ask</a><a href="prep.html">Prep</a></span></div>
  <h1 id="cname">Company</h1>
  <div class="ticker" id="cticker"></div>
</header>

<div class="pick">Switch company: <select id="picker"></select></div>
<div class="grid" id="statgrid"></div>
<h2>Deal involvement</h2><div id="dealsBox"></div>
<h2>Earnings notes</h2><div id="earnBox"></div>
<h2>Recent coverage</h2><div id="newsBox"></div>
<p class="foot">A homemade tearsheet: mention trends, deal-tracker entries, and tracked coverage for one name. Data refreshes with the pipeline; approximate figures — verify before use.</p>
</div>
<script>
let NEWS=[], DEALS=[], TRENDS=[], WATCH=[], EARN=[];
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const params=new URLSearchParams(location.search);
let company=params.get('c')||'Nvidia';
const fmtB=v=>v==null?'—':(v>=1000?'$'+(v/1000).toFixed(2)+'T':v>=1?'$'+(+v.toFixed(1)).toLocaleString()+'B':'$'+Math.round(v*1000)+'M');

async function load(){
  const [n,d,t,w,er]=await Promise.all([
    fetch('data/news.json?t='+Date.now()).then(r=>r.json()),
    fetch('data/deals.json?t='+Date.now()).then(r=>r.json()),
    fetch('data/trends.json?t='+Date.now()).then(r=>r.json()).catch(()=>({trends:[]})),
    fetch('config/watchlist.json?t='+Date.now()).then(r=>r.json()).catch(()=>({watchlist:[]})),
    fetch('data/earnings.json?t='+Date.now()).then(r=>r.json()).catch(()=>({notes:[]})),
  ]);
  NEWS=n.items; DEALS=d.deals; TRENDS=t.trends||[]; WATCH=(w.watchlist||[]).concat((w.korea&&w.korea.companies)||[]); EARN=er.notes||[];
  const names=[...new Set([...WATCH.map(x=>x.name), ...NEWS.flatMap(x=>x.companies||[])])].sort();
  const p=document.getElementById('picker');
  p.innerHTML=names.map(x=>`<option ${x===company?'selected':''}>${x}</option>`).join('');
  p.onchange=e=>{company=e.target.value;history.replaceState(null,'','company.html?c='+encodeURIComponent(company));render();};
  render();
}
function render(){
  document.getElementById('cname').textContent=company;
  const w=WATCH.find(x=>x.name===company);
  document.getElementById('cticker').textContent=w&&w.ticker?w.ticker:'';
  document.title=company+' · Tech Tape';

  const stories=NEWS.filter(x=>(x.companies||[]).includes(company));
  const t=TRENDS.find(x=>x.entity===company);
  const deals=DEALS.filter(d=>d.name.toLowerCase().includes(company.toLowerCase()));
  const dealVal=deals.reduce((s,d)=>s+(d.v||0),0);

  const spark=t?`<span class="spark">${t.spark.map(v=>{const m=Math.max(1,...t.spark);return `<i style="height:${Math.max(8,v/m*100)}%"></i>`}).join('')}</span>`:'—';
  document.getElementById('statgrid').innerHTML=`
    <div class="cell"><div class="n">${stories.length}</div><div class="l">Stories (14d)</div></div>
    <div class="cell"><div class="n">${t?t.score.toFixed(1)+'×':'—'}</div><div class="l">Today vs avg ${t&&t.spiking?'· SPIKE':''}</div></div>
    <div class="cell"><div class="l">8-day mentions</div>${spark}</div>
    <div class="cell"><div class="n">${deals.length}</div><div class="l">Tracked deals</div></div>
    <div class="cell"><div class="n">${fmtB(dealVal||null)}</div><div class="l">Deal value involved</div></div>
    <div class="cell"><div class="n">${stories.filter(s=>s.importance===3).length}</div><div class="l">Market-moving items</div></div>`;

  document.getElementById('dealsBox').innerHTML = deals.length ? deals.map(d=>`
    <div class="deal"><span class="dname">${esc(d.name)}</span>
      <div class="meta">${d.d} · ${d.type} · ${fmtB(d.v)} · ${d.status}${(d.advisors||[]).length?' · Advisors: '+esc(d.advisors.join(', ')):''}</div>
      <div class="note">${esc(d.note)}</div></div>`).join('')
    : '<div class="empty">No tracked deals involve this company yet.</div>';

  const notes = EARN.filter(e=>e.company===company);
  const mdMini = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>`<p style="margin-bottom:4px">${l}</p>`).join('');
  document.getElementById('earnBox').innerHTML = notes.length ? notes.slice(0,4).map(e=>`
    <div class="story"><div class="meta">${e.date}${e.source_url?` · <a href="${e.source_url}" target="_blank" rel="noopener">source</a>`:''}</div>
      <div class="note">${mdMini(e.markdown)}</div></div>`).join('')
    : '<div class="empty">No earnings notes yet — they appear when watchlist companies report.</div>';

  document.getElementById('newsBox').innerHTML = stories.length ? stories.slice(0,25).map(x=>`
    <div class="story"><span class="imp i${x.importance}"></span><span class="s-title">${x.url?`<a href="${x.url}" target="_blank" rel="noopener">${esc(x.title)}</a>`:esc(x.title)}</span>
      <div class="meta">${new Date(x.ts).toLocaleDateString()} · ${x.outlet||'—'} · ${x.category}${x.ib_tags.length?' · '+x.ib_tags.join(', '):''}</div>
      ${x.summary?`<div class="note">${esc(x.summary)}</div>`:''}</div>`).join('')
    : '<div class="empty">No recent coverage in the tracked window.</div>';
}
load();
setInterval(load, 5*60*1000);
</script>
</body></html>
