name: Update news & trends

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-updates          # never collide with the deals workflow commit
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Poll feeds
        run: python pipeline/news_feed_poll.py 6

      - name: Poll Korean sources (DART + KR news)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python pipeline/dart_poll.py 1

      - name: Classify with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/classify.py

      - name: Tag deal lifecycle (rumor/announced/closed)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/lifecycle.py

      - name: Earnings notes for watchlist reporters
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/earnings.py

      - name: Merge news + compute trends
        run: python pipeline/update_news.py

      # Synergy: classify.py routed M&A-tagged stories into
      # pipeline/out/candidates_news.json — run the deal extract/merge on them.
      # FMP adds structured M&A rows (no LLM needed) and appends to the same
      # extracted.json, so both flow through one merge -> dedupe -> audit pass.
      - name: Feed M&A items into the deal tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          if [ -s pipeline/out/candidates_news.json ]; then
            python pipeline/extract.py
          fi
          python pipeline/fmp_poll.py          # no-ops cleanly if key unset
          if [ -s pipeline/out/extracted.json ]; then
            python pipeline/update_deals.py
            python pipeline/dedupe.py
          fi
          python pipeline/audit.py
          python pipeline/scrub_publish.py

      - name: Send webhook alerts
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: python pipeline/alerts.py

      - name: Commit if changed
        run: |
          git config user.name "deal-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/news.json data/trends.json data/deals.json data/deals.public.json data/audit.json data/earnings.json data/.alert_state.json data/feedback.jsonl pipeline/LESSONS.md
          git diff --cached --quiet || git commit -m "chore: auto-update news $(date -u '+%F %H:%M')"
          git pull --rebase --autostash -X theirs
          git push
